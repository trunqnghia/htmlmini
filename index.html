<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Mini-project 2: HTML Head Checklist</title>
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <h1>HTML HEAD CHECKLIST</h1>
    <p>Hướng dẫn cấu hình thẻ Head chuẩn chỉnh và chuyên nghiệp</p>
  </header>

  <section class="ui-preview-section">
    <h2>Sơ đồ phân vùng & Thiết kế UI giao diện</h2>
    <div class="image-wrapper">
      <img src="assets/ui-design.png" alt="Ảnh chụp thiết kế UI/Page" class="ui-img">
    </div>
  </section>

  <main class="checklist-container">
    <h2>Danh sách các mục cần kiểm tra</h2>

    <article class="checklist-item">
      <input type="checkbox" id="item1">
      <label for="item1">
        <strong>1. Thẻ meta charset="UTF-8"</strong>
        <p>Khai báo bảng mã ký tự giúp hiển thị tiếng Việt đúng, không bị lỗi font chữ.</p>
      </label>
    </article>

    <article class="checklist-item">
      <input type="checkbox" id="item2">
      <label for="item2">
        <strong>2. Thẻ meta viewport</strong>
        <p>Giúp trang web tự động co giãn, tương thích hoàn hảo trên các thiết bị di động.</p>
      </label>
    </article>

    <article class="checklist-item">
      <input type="checkbox" id="item3">
      <label for="item3">
        <strong>3. Thẻ title rõ nghĩa</strong>
        <p>Định nghĩa tiêu đề xuất hiện trên tab trình duyệt và kết quả tìm kiếm Google.</p>
      </label>
    </article>

    <article class="checklist-item">
      <input type="checkbox" id="item4">
      <label for="item4">
        <strong>4. Liên kết CSS ngoài</strong>
        <p>Sử dụng thẻ <code>&lt;link rel="stylesheet" href="..."&gt;</code> đặt trong phần head.</p>
      </label>
    </article>

    <article class="checklist-item">
      <input type="checkbox" id="item5">
      <label for="item5">
        <strong>5. Nhúng tệp JavaScript</strong>
        <p>Đặt thẻ <code>&lt;script src="..."&gt;&lt;/script&gt;</code> ở gần cuối thẻ đóng body để tối ưu tốc độ nạp trang.</p>
      </label>
    </article>

    <article class="checklist-item">
      <input type="checkbox" id="item6">
      <label for="item6">
        <strong>6. Bình luận và thụt dòng chuẩn</strong>
        <p>Dùng cú pháp <code>&lt;!-- --&gt;</code> ghi chú ngắn gọn và thụt dòng lùi vào một mức để nhìn rõ quan hệ cha-con.</p>
      </label>
    </article>

  </main>

  <footer class="site-footer">
    <p>© 2026 - Mini-project hoàn thành bởi Nguyễn Trung Nghĩa</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
